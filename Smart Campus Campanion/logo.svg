<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1976d2"/>
    </linearGradient>

    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6f00"/>
      <stop offset="100%" stop-color="#ff9800"/>
    </linearGradient>
  </defs>

  <!-- Book -->
  <path d="M80 120 Q120 60 160 120 L160 170 Q120 130 80 170 Z" fill="url(#blueGrad)"/>
  <path d="M160 120 Q200 60 240 120 L240 170 Q200 130 160 170 Z" fill="url(#orangeGrad)"/>

  <!-- Cap -->
  <polygon points="120,60 200,60 170,40 90,40" fill="#263238"/>
  <rect x="135" y="60" width="50" height="10" fill="#000"/>
  <line x1="170" y1="60" x2="170" y2="85" stroke="#ff9800" stroke-width="3"/>
  <circle cx="170" cy="90" r="4" fill="#ff9800"/>

  <!-- Digital Squares -->
  <rect x="245" y="75" width="10" height="10" fill="#ff9800"/>
  <rect x="260" y="60" width="12" height="12" fill="#1976d2"/>
  <rect x="275" y="80" width="8" height="8" fill="#ff9800"/>
  <rect x="290" y="70" width="10" height="10" fill="#1976d2"/>

  <!-- Text -->
  <text x="300" y="110" font-family="Arial" font-size="70" font-weight="bold" fill="url(#blueGrad)">
    BBD
  </text>

  <text x="305" y="150" font-family="Arial" font-size="35" font-style="italic" fill="#ff6f00">
    smartclass
  </text>

  <!-- Bottom Curves -->
  <path d="M280 170 Q400 210 520 170" stroke="url(#orangeGrad)" stroke-width="8" fill="none"/>
  <path d="M280 185 Q400 230 520 185" stroke="url(#blueGrad)" stroke-width="5" fill="none"/>

</svg>