<!DOCTYPE html>
<html>

<head>
    <title>Smart Campus</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1 class="main-title">BBD SMART CLASS</h1>

        <div class="grid">

            <!-- Single Room -->
            <div class="card">
                <h2>Check Single Room</h2>

                <input type="text" id="room" placeholder="Enter Room Number">

                <select id="day">
                    <option value="">Select Day</option>
                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                </select>

                <select id="time">
                    <option value="">Select Time</option>
                    <option>09:00</option>
                    <option>10:00</option>
                    <option>11:00</option>
                    <option>12:00</option>
                    <option>13:00</option>
                    <option>14:00</option>
                    <option>15:00</option>
                    <option>16:00</option>
                </select>

                <button onclick="checkRoom()">Check</button>
                <div id="result" class="result"></div>
            </div>

            <!-- All Rooms -->
            <div class="card">
                <h2>Check All Rooms</h2>

                <select id="allDay">
                    <option value="">Select Day</option>
                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                </select>

                <select id="allTime">
                    <option value="">Select Time</option>
                    <option>09:00</option>
                    <option>10:00</option>
                    <option>11:00</option>
                    <option>12:00</option>
                    <option>13:00</option>
                    <option>14:00</option>
                    <option>15:00</option>
                    <option>16:00</option>
                </select>

                <button onclick="checkAll()">Check All</button>
                <div id="allResult" class="result"></div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
